spring.application.name=order-service
spring.datasource.url=jdbc:mysql://localhost:3306/orderdb
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

resilence4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilence4j.circuitbreaker.instances.paymentService.minimum-number-of-calls=5
resilence4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=10s

resilence4j.retry.instances.paymentService.max-attempts=3
resilence4j.retry.instances.paymentService.wait-duration=2s